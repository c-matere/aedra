services:
  postgres:
    build:
      context: ./api
      dockerfile: postgres.Dockerfile
    container_name: aedra-postgres
    ports:
      - "4543:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aedra
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: aedra-redis
    ports:
      - "4379:6379"
    restart: always

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: aedra-api
    ports:
      - "4001:4001"
    env_file:
      - ./api/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/aedra?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4001
    depends_on:
      - postgres
      - redis
    volumes:
      - api_uploads:/app/uploads
    restart: always

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_AEDRA_API_URL=${NEXT_PUBLIC_AEDRA_API_URL:-http://localhost:4001}
    container_name: aedra-web
    ports:
      - "4000:4000"
    environment:
      - AEDRA_API_URL=http://aedra-api:4001
    depends_on:
      - api
    restart: always

volumes:
  pgdata:
  api_uploads:
