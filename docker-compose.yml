services:
  postgres:
    image: kartoza/postgis:15
    container_name: aedra-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aedra
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: aedra-redis
    restart: always

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: aedra-api
    ports:
      - "3002:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/aedra?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    restart: always

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_AEDRA_API_URL=${NEXT_PUBLIC_AEDRA_API_URL}
    container_name: aedra-web
    ports:
      - "3010:3000"
    environment:
      - AEDRA_API_URL=http://api:3001
    depends_on:
      - api
    restart: always

volumes:
  pgdata:
