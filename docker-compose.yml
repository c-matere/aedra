services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: aedra-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aedra
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: aedra-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
