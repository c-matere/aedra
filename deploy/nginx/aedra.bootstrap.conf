server {
    listen 80;
    server_name aedra.nomeet.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        # Redirect to HTTPS once we have it, but for bootstrap just return 200 or proxy if needed
        # Actually, for certbot it just needs to serve the challenge
        return 200 "Bootstrap mode. Ready for SSL.";
    }
}
